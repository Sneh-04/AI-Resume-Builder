# Server
server.port=8080
spring.application.name=resume-ai-backend

# Database - PostgreSQL (Neon.tech in production, local for dev)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/resume_ai_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Anthropic API
anthropic.api.key=${ANTHROPIC_API_KEY:your-api-key-here}
anthropic.api.url=https://api.anthropic.com/v1/messages

# Logging
logging.level.root=INFO
logging.level.com.resumeai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson
